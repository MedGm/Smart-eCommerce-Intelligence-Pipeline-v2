version: 2

models:
  - name: stg_products
    description: "Typed, trimmed products from raw warehouse table"
    columns:
      - name: product_id
        data_tests:
          - not_null
      - name: source_platform
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [shopify, woocommerce]
      - name: dq_score
        data_tests:
          - not_null
