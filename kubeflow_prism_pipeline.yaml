# PIPELINE DEFINITION
# Name: prism-pipeline
# Description: PRISM: preprocess → DQ → features → score + ML → MinIO + MLflow
# Inputs:
#    data_dir: str [Default: '/app/data']
components:
  comp-association-rules-op:
    executorLabel: exec-association-rules-op
    inputDefinitions:
      artifacts:
        features:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        data_dir:
          parameterType: STRING
  comp-cluster-dbscan-op:
    executorLabel: exec-cluster-dbscan-op
    inputDefinitions:
      artifacts:
        features:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        data_dir:
          parameterType: STRING
  comp-cluster-kmeans-op:
    executorLabel: exec-cluster-kmeans-op
    inputDefinitions:
      artifacts:
        features:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        data_dir:
          parameterType: STRING
  comp-dq-op:
    executorLabel: exec-dq-op
    inputDefinitions:
      artifacts:
        processed:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        data_dir:
          parameterType: STRING
  comp-features-op:
    executorLabel: exec-features-op
    inputDefinitions:
      artifacts:
        processed:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        data_dir:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        features:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-preprocess-op:
    executorLabel: exec-preprocess-op
    inputDefinitions:
      parameters:
        data_dir:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        processed:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-score-op:
    executorLabel: exec-score-op
    inputDefinitions:
      artifacts:
        features:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        data_dir:
          parameterType: STRING
  comp-train-classifier-op:
    executorLabel: exec-train-classifier-op
    inputDefinitions:
      artifacts:
        features:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        data_dir:
          parameterType: STRING
  comp-train-xgboost-op:
    executorLabel: exec-train-xgboost-op
    inputDefinitions:
      artifacts:
        features:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        data_dir:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-association-rules-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - association_rules_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef association_rules_op(data_dir: str, features: dsl.Input[dsl.Dataset]):\n\
          \    \"\"\"Download features \u2192 mine association rules \u2192 upload\
          \ CSV.\"\"\"\n    import os, pathlib\n    os.environ[\"DATA_DIR\"] = data_dir\n\
          \    p_dir = pathlib.Path(data_dir) / \"processed\"\n    p_dir.mkdir(parents=True,\
          \ exist_ok=True)\n    a_dir = pathlib.Path(data_dir) / \"analytics\"\n \
          \   a_dir.mkdir(parents=True, exist_ok=True)\n\n    from src.storage.minio_client\
          \ import _client\n    c = _client()\n    c.download_file(\"processed\",\
          \ \"features.parquet\", str(p_dir / \"features.parquet\"))\n\n    from src.ml.rules\
          \ import run\n    run()\n\n    if (a_dir / \"association_rules.csv\").exists():\n\
          \        c.upload_file(str(a_dir / \"association_rules.csv\"), \"processed\"\
          ,\n                      \"analytics/association_rules.csv\")\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: http://192.168.49.1:9000
        - name: MINIO_ACCESS_KEY
          value: minioadmin
        - name: MINIO_SECRET_KEY
          value: minioadmin
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://192.168.49.1:9000
        - name: MLFLOW_TRACKING_URI
          value: http://192.168.49.1:5000
        - name: GIT_PYTHON_REFRESH
          value: quiet
        image: prism-app:local
    exec-cluster-dbscan-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - cluster_dbscan_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef cluster_dbscan_op(data_dir: str, features: dsl.Input[dsl.Dataset]):\n\
          \    \"\"\"Download features \u2192 DBSCAN clustering \u2192 upload results.\"\
          \"\"\n    import os, pathlib\n    os.environ[\"DATA_DIR\"] = data_dir\n\
          \    p_dir = pathlib.Path(data_dir) / \"processed\"\n    p_dir.mkdir(parents=True,\
          \ exist_ok=True)\n    a_dir = pathlib.Path(data_dir) / \"analytics\"\n \
          \   a_dir.mkdir(parents=True, exist_ok=True)\n\n    from src.storage.minio_client\
          \ import _client\n    c = _client()\n    c.download_file(\"processed\",\
          \ \"features.parquet\", str(p_dir / \"features.parquet\"))\n\n    from src.ml.dbscan_products\
          \ import run\n    run()\n\n    if (a_dir / \"dbscan_clusters.csv\").exists():\n\
          \        c.upload_file(str(a_dir / \"dbscan_clusters.csv\"), \"processed\"\
          ,\n                      \"analytics/dbscan_clusters.csv\")\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: http://192.168.49.1:9000
        - name: MINIO_ACCESS_KEY
          value: minioadmin
        - name: MINIO_SECRET_KEY
          value: minioadmin
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://192.168.49.1:9000
        - name: MLFLOW_TRACKING_URI
          value: http://192.168.49.1:5000
        - name: GIT_PYTHON_REFRESH
          value: quiet
        image: prism-app:local
    exec-cluster-kmeans-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - cluster_kmeans_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef cluster_kmeans_op(data_dir: str, features: dsl.Input[dsl.Dataset]):\n\
          \    \"\"\"Download features \u2192 KMeans clustering \u2192 upload clusters\
          \ CSV.\"\"\"\n    import os, pathlib\n    os.environ[\"DATA_DIR\"] = data_dir\n\
          \    p_dir = pathlib.Path(data_dir) / \"processed\"\n    p_dir.mkdir(parents=True,\
          \ exist_ok=True)\n    a_dir = pathlib.Path(data_dir) / \"analytics\"\n \
          \   a_dir.mkdir(parents=True, exist_ok=True)\n\n    from src.storage.minio_client\
          \ import _client\n    c = _client()\n    c.download_file(\"processed\",\
          \ \"features.parquet\", str(p_dir / \"features.parquet\"))\n\n    from src.ml.cluster_products\
          \ import run\n    run()\n\n    for fname in [\"clusters.csv\", \"pca_viz.csv\"\
          , \"cluster_metrics.json\"]:\n        if (a_dir / fname).exists():\n   \
          \         c.upload_file(str(a_dir / fname), \"processed\", f\"analytics/{fname}\"\
          )\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: http://192.168.49.1:9000
        - name: MINIO_ACCESS_KEY
          value: minioadmin
        - name: MINIO_SECRET_KEY
          value: minioadmin
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://192.168.49.1:9000
        - name: MLFLOW_TRACKING_URI
          value: http://192.168.49.1:5000
        - name: GIT_PYTHON_REFRESH
          value: quiet
        image: prism-app:local
    exec-dq-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - dq_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef dq_op(data_dir: str, processed: dsl.Input[dsl.Dataset]):\n  \
          \  \"\"\"Download cleaned parquet from MinIO \u2192 run Great Expectations.\"\
          \"\"\n    import os, pathlib\n    os.environ[\"DATA_DIR\"] = data_dir\n\
          \    parquet = pathlib.Path(data_dir) / \"processed\" / \"cleaned_products.parquet\"\
          \n    if not parquet.exists():\n        parquet.parent.mkdir(parents=True,\
          \ exist_ok=True)\n        from src.storage.minio_client import _client\n\
          \        _client().download_file(\"processed\", \"cleaned_products.parquet\"\
          , str(parquet))\n    from src.pipeline.dq_step import run_or_raise\n   \
          \ run_or_raise(parquet_path=str(parquet))\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: http://192.168.49.1:9000
        - name: MINIO_ACCESS_KEY
          value: minioadmin
        - name: MINIO_SECRET_KEY
          value: minioadmin
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://192.168.49.1:9000
        - name: MLFLOW_TRACKING_URI
          value: http://192.168.49.1:5000
        - name: GIT_PYTHON_REFRESH
          value: quiet
        image: prism-app:local
    exec-features-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - features_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef features_op(\n    data_dir: str,\n    processed: dsl.Input[dsl.Dataset],\n\
          \    features: dsl.Output[dsl.Dataset],\n):\n    \"\"\"Download cleaned\
          \ parquet \u2192 build features \u2192 upload features parquet.\"\"\"\n\
          \    import os, pathlib\n    os.environ[\"DATA_DIR\"] = data_dir\n    p_dir\
          \ = pathlib.Path(data_dir) / \"processed\"\n    p_dir.mkdir(parents=True,\
          \ exist_ok=True)\n\n    from src.storage.minio_client import _client\n \
          \   c = _client()\n    c.download_file(\"processed\", \"cleaned_products.parquet\"\
          ,\n                    str(p_dir / \"cleaned_products.parquet\"))\n\n  \
          \  from src.features.build_features import run\n    run()\n\n    c.upload_file(str(p_dir\
          \ / \"features.parquet\"), \"processed\", \"features.parquet\")\n    features.metadata[\"\
          data_dir\"] = data_dir\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: http://192.168.49.1:9000
        - name: MINIO_ACCESS_KEY
          value: minioadmin
        - name: MINIO_SECRET_KEY
          value: minioadmin
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://192.168.49.1:9000
        - name: MLFLOW_TRACKING_URI
          value: http://192.168.49.1:5000
        - name: GIT_PYTHON_REFRESH
          value: quiet
        image: prism-app:local
    exec-preprocess-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - preprocess_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess_op(data_dir: str, processed: dsl.Output[dsl.Dataset]):\n\
          \    \"\"\"Sync raw from MinIO \u2192 preprocess \u2192 upload cleaned parquet.\"\
          \"\"\n    import os\n    os.environ[\"DATA_DIR\"] = data_dir\n    from src.preprocessing.run\
          \ import run\n    run()  # internally syncs raw from MinIO + uploads processed\n\
          \    processed.metadata[\"data_dir\"] = data_dir\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: http://192.168.49.1:9000
        - name: MINIO_ACCESS_KEY
          value: minioadmin
        - name: MINIO_SECRET_KEY
          value: minioadmin
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://192.168.49.1:9000
        - name: MLFLOW_TRACKING_URI
          value: http://192.168.49.1:5000
        - name: GIT_PYTHON_REFRESH
          value: quiet
        image: prism-app:local
    exec-score-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - score_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef score_op(data_dir: str, features: dsl.Input[dsl.Dataset]):\n\
          \    \"\"\"Download features \u2192 score \u2192 upload topk CSVs.\"\"\"\
          \n    import os, pathlib\n    os.environ[\"DATA_DIR\"] = data_dir\n    p_dir\
          \ = pathlib.Path(data_dir) / \"processed\"\n    p_dir.mkdir(parents=True,\
          \ exist_ok=True)\n    a_dir = pathlib.Path(data_dir) / \"analytics\"\n \
          \   a_dir.mkdir(parents=True, exist_ok=True)\n\n    from src.storage.minio_client\
          \ import _client\n    c = _client()\n    c.download_file(\"processed\",\
          \ \"features.parquet\", str(p_dir / \"features.parquet\"))\n\n    from src.scoring.topk\
          \ import run\n    run()\n\n    for fname in [\"topk_products.csv\", \"topk_per_category.csv\"\
          , \"topk_per_shop.csv\"]:\n        if (a_dir / fname).exists():\n      \
          \      c.upload_file(str(a_dir / fname), \"processed\", f\"analytics/{fname}\"\
          )\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: http://192.168.49.1:9000
        - name: MINIO_ACCESS_KEY
          value: minioadmin
        - name: MINIO_SECRET_KEY
          value: minioadmin
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://192.168.49.1:9000
        - name: MLFLOW_TRACKING_URI
