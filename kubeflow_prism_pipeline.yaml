          \n    p_dir.mkdir(parents=True, exist_ok=True)\n    pathlib.Path(data_dir,\
          \ \"models\").mkdir(parents=True, exist_ok=True)\n    pathlib.Path(data_dir,\
          \ \"analytics\").mkdir(parents=True, exist_ok=True)\n\n    from src.storage.minio_client\
          \ import _client\n    _client().download_file(\"processed\", \"features.parquet\"\
          , str(p_dir / \"features.parquet\"))\n\n    from src.ml.train_classifier\
          \ import run\n    run()\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: http://192.168.49.1:9000
        - name: MINIO_ACCESS_KEY
          value: minioadmin
        - name: MINIO_SECRET_KEY
          value: minioadmin
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://192.168.49.1:9000
        - name: MLFLOW_TRACKING_URI
          value: http://192.168.49.1:5000
        - name: GIT_PYTHON_REFRESH
          value: quiet
        image: prism-app:local
    exec-train-xgboost-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_xgboost_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_xgboost_op(data_dir: str, features: dsl.Input[dsl.Dataset]):\n\
          \    \"\"\"Download features \u2192 train XGBoost \u2192 log to MLflow \u2192\
          \ upload model to MinIO.\"\"\"\n    import os, pathlib\n    os.environ[\"\
          DATA_DIR\"] = data_dir\n    p_dir = pathlib.Path(data_dir) / \"processed\"\
          \n    p_dir.mkdir(parents=True, exist_ok=True)\n    pathlib.Path(data_dir,\
          \ \"models\").mkdir(parents=True, exist_ok=True)\n    pathlib.Path(data_dir,\
          \ \"analytics\").mkdir(parents=True, exist_ok=True)\n\n    from src.storage.minio_client\
          \ import _client\n    _client().download_file(\"processed\", \"features.parquet\"\
          , str(p_dir / \"features.parquet\"))\n\n    from src.ml.train_xgboost import\
          \ run\n    run()\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: http://192.168.49.1:9000
        - name: MINIO_ACCESS_KEY
          value: minioadmin
        - name: MINIO_SECRET_KEY
          value: minioadmin
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://192.168.49.1:9000
        - name: MLFLOW_TRACKING_URI
          value: http://192.168.49.1:5000
        - name: GIT_PYTHON_REFRESH
          value: quiet
        image: prism-app:local
