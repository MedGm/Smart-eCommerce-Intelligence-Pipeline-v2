# PIPELINE DEFINITION
# Name: prism-pipeline
# Description: Full ML/DM pipeline for eCommerce product analysis. Scraping runs as a pre-step; LLM summary via dashboard.
# Inputs:
#    data_dir: str [Default: '/app/data']
components:
  comp-association-rules-op:
    executorLabel: exec-association-rules-op
    inputDefinitions:
      parameters:
        data_dir:
          parameterType: STRING
  comp-cluster-dbscan-op:
    executorLabel: exec-cluster-dbscan-op
    inputDefinitions:
      parameters:
        data_dir:
          parameterType: STRING
  comp-cluster-kmeans-op:
    executorLabel: exec-cluster-kmeans-op
    inputDefinitions:
      parameters:
        data_dir:
          parameterType: STRING
  comp-features-op:
    executorLabel: exec-features-op
    inputDefinitions:
      parameters:
        data_dir:
          parameterType: STRING
  comp-preprocess-op:
    executorLabel: exec-preprocess-op
    inputDefinitions:
      parameters:
        data_dir:
          parameterType: STRING
  comp-score-op:
    executorLabel: exec-score-op
    inputDefinitions:
      parameters:
        data_dir:
          parameterType: STRING
  comp-train-classifier-op:
    executorLabel: exec-train-classifier-op
    inputDefinitions:
      parameters:
        data_dir:
          parameterType: STRING
  comp-train-xgboost-op:
    executorLabel: exec-train-xgboost-op
    inputDefinitions:
      parameters:
        data_dir:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-association-rules-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - association_rules_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef association_rules_op(data_dir: str):\n    import os\n\n    os.environ[\"\
          DATA_DIR\"] = data_dir\n    from src.ml.rules import run\n\n    run()\n\n"
        image: prism-app:latest
