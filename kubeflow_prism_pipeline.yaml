pipelineInfo:
  description: Full ML/DM pipeline for eCommerce product analysis. Scraping runs as
    a pre-step; LLM summary via dashboard.
  name: prism-pipeline
root:
  dag:
    tasks:
      association-rules-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-association-rules-op
        dependentTasks:
        - features-op
        inputs:
          parameters:
            data_dir:
              componentInputParameter: data_dir
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: association-rules-op
      cluster-dbscan-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-cluster-dbscan-op
        dependentTasks:
        - features-op
        inputs:
          parameters:
            data_dir:
              componentInputParameter: data_dir
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: cluster-dbscan-op
      cluster-kmeans-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-cluster-kmeans-op
        dependentTasks:
        - features-op
        inputs:
          parameters:
            data_dir:
              componentInputParameter: data_dir
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: cluster-kmeans-op
      features-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-features-op
        dependentTasks:
        - preprocess-op
        inputs:
          parameters:
            data_dir:
              componentInputParameter: data_dir
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: features-op
      preprocess-op:
        cachingOptions: {}
        componentRef:
          name: comp-preprocess-op
        inputs:
          parameters:
            data_dir:
              componentInputParameter: data_dir
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: preprocess-op
      score-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-score-op
        dependentTasks:
        - features-op
        inputs:
          parameters:
            data_dir:
              componentInputParameter: data_dir
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: score-op
      train-classifier-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-classifier-op
        dependentTasks:
        - score-op
        inputs:
          parameters:
            data_dir:
              componentInputParameter: data_dir
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: train-classifier-op
      train-xgboost-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-xgboost-op
        dependentTasks:
        - score-op
        inputs:
          parameters:
            data_dir:
              componentInputParameter: data_dir
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: train-xgboost-op
  inputDefinitions:
    parameters:
      data_dir:
        defaultValue: /app/data
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.1
