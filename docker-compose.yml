# Smart eCommerce Intelligence Pipeline — Docker Compose
#
# Services
#   infra   : MinIO (object storage) + MLflow (experiment tracking)
#   pipeline: full pipeline run (scrape → preprocess → features → score → train)
#   dashboard: Streamlit BI dashboard
#
# Usage
#   docker compose --profile infra up -d                              # infrastructure only
#   docker compose --profile pipeline up                              # run pipeline (needs infra)
#   docker compose --profile dashboard up -d                          # launch dashboard (needs infra)
#   docker compose --profile infra --profile dashboard up -d          # infra + dashboard together

services:

  # ── Object storage (MinIO — S3-compatible) ────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-06T22-24-58Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  →  http://localhost:9001
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 15
    profiles: [infra]

  # One-shot: create buckets on first start
  minio-init:
    image: minio/mc:RELEASE.2024-11-06T22-24-58Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/raw-data;
        mc mb --ignore-existing local/processed;
        mc mb --ignore-existing local/models;
        mc mb --ignore-existing local/mlflow;
        echo 'MinIO buckets ready.';
      "
    profiles: [infra]

  # ── Experiment tracking + model registry (MLflow) ────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    command: >
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://mlflow/artifacts
    ports:
      - "5000:5000"   # UI + API  →  http://localhost:5000
    volumes:
      - mlflow_data:/mlflow
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      minio:
        condition: service_healthy
    profiles: [infra]

  # ── Pipeline runner ───────────────────────────────────────────────────────
  app:
    build: .
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      minio:
        condition: service_healthy
    command: ["python", "-m", "src.pipeline.local_pipeline"]
    profiles: [pipeline]

  # ── Streamlit BI dashboard ────────────────────────────────────────────────
  dashboard:
    build: .
    ports:
      - "8501:8501"   # →  http://localhost:8501
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command:
      - streamlit
      - run
      - src/dashboard/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
    profiles: [dashboard]

volumes:
  minio_data:
  mlflow_data:
