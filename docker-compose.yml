# PRISM — Product Ranking Intelligence & Signal Mining Pipeline — Docker Compose
#
# Services
#   (no profile) app: universal runner — use with `docker compose run --rm app <cmd>`
#   infra        : MinIO (object storage) + MLflow (experiment tracking)
#   pipeline     : full pipeline run wired to infra
#   dashboard    : Streamlit BI dashboard wired to infra
#
# Typical usage
#   docker compose build                                              # build app image
#   docker compose run --rm app pytest tests/ -q                     # run tests
#   docker compose run --rm app python -m src.scraping.run_scrapers  # scrape
#   docker compose --profile infra up -d                             # start infrastructure
#   docker compose --profile pipeline up                             # full pipeline + infra
#   docker compose --profile dashboard up -d                         # dashboard + infra

services:

  # ── Universal runner (no profile — always available) ─────────────────────
  # Use this for: tests, one-off commands, local dev without infra.
  # MinIO/MLflow env vars intentionally absent — add via .env or --env flags
  # when you want integration with infra.
  app:
    build: .
    volumes:
      - ./data:/app/data
      - .:/app              # live source mount for dev — edit code, re-run immediately
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data
      PYTHONPATH: /app

  # ── Object storage (MinIO — S3-compatible) ────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-06T22-24-58Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  →  http://localhost:9001
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 15
    profiles: [infra]

  # One-shot: create buckets on first start
  minio-init:
    image: minio/mc:RELEASE.2024-11-06T22-24-58Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/raw-data;
        mc mb --ignore-existing local/processed;
        mc mb --ignore-existing local/models;
        mc mb --ignore-existing local/mlflow;
        echo 'MinIO buckets ready.';
      "
    profiles: [infra]

  # ── Experiment tracking + model registry (MLflow) ────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    command: >
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://mlflow/artifacts
    ports:
      - "5000:5000"   # UI + API  →  http://localhost:5000
    volumes:
      - mlflow_data:/mlflow
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      minio:
        condition: service_healthy
    profiles: [infra]

  # ── Full pipeline wired to infra ──────────────────────────────────────────
  pipeline:
    build: .
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data
      PYTHONPATH: /app
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      minio:
        condition: service_healthy
    command: ["python", "-m", "src.pipeline.local_pipeline"]
    profiles: [pipeline]

  # ── Streamlit BI dashboard ────────────────────────────────────────────────
  dashboard:
    build: .
    ports:
      - "8501:8501"   # →  http://localhost:8501
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data
      PYTHONPATH: /app
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command:
      - streamlit
      - run
      - src/dashboard/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
    profiles: [dashboard]

  # ── Apache Superset BI dashboard ─────────────────────────────────────────────
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    ports:
      - "8088:8088"   # →  http://localhost:8088
    volumes:
      - superset_home:/app/superset_home
      - ./data:/app/data:ro   # DuckDB warehouse (read-only)
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-in-production-32-chars!}
    depends_on:
      superset-init:
        condition: service_completed_successfully
    profiles: [superset]

  superset-init:
    build:
      context: .
      dockerfile: Dockerfile.superset
    volumes:
      - superset_home:/app/superset_home
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-in-production-32-chars!}
    command: >
      /bin/sh -c "
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname User
          --email admin@superset.local
          --password admin || true &&
        superset init &&
        echo 'Superset initialised. Login: admin / admin at http://localhost:8088'
      "
    restart: "no"
    profiles: [superset]

volumes:
  minio_data:
  mlflow_data:
  superset_home:
